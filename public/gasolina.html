<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gasolina — Control de Transporte DINMEC</title>
<meta name="theme-color" content="#1c3a63">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icono-192.png">
<link rel="stylesheet" href="estilos.css">
</head>
<body>
<div class="barra">
  <div class="logo"><span class="lg"><img src="/logo.png" alt="DINMEC"></span> <span>Control de Transporte</span></div>
  <span class="envivo" id="envivo" style="display:none"><i></i> en vivo</span>
  <div class="crece"></div>
  <button class="btn chico" style="background:rgba(255,255,255,.15);color:#fff" onclick="location.href='index.html'">← Inicio</button>
</div>

<div class="contenedor">
  <div class="nav-sec">
    <a href="index.html">🚚 Salidas</a>
    <a class="activa" href="gasolina.html">⛽ Gasolina</a>
    <a href="incidentes.html">⚠️ Incidentes</a>
    <a href="flota.html">🚛 Flota</a>
    <a href="gps.html">📍 GPS</a>
  </div>
  <div class="seccion-tit">
    <h2>Cargas de gasolina</h2>
    <div style="flex:1"></div>
    <button class="btn fantasma chico" onclick="location.href='reporte.html'">📊 Reporte mensual</button>
    <button class="btn primario" onclick="location.href='carga.html'">➕ Nueva carga</button>
  </div>
  <div class="grid" id="lista"></div>
  <div class="vacio" id="vacio" style="display:none">
    No hay cargas de gasolina registradas.<br><br>
    Cuando carguen combustible, toca <b>➕ Nueva carga</b>: se registra dónde se cargó,
    cómo se pagó, y las fotos de la bomba, el kilometraje y el ticket.
  </div>
</div>

<script src="comun.js"></script>
<script>
let YO=null, CARGAS=[];

async function inicio(){
  YO = await exigirSesion(); if(!YO) return;
  await cargar();
  const ev = conectarEnVivo(()=>cargar());
  if(ev) document.getElementById("envivo").style.display="inline-flex";
}
async function cargar(){
  CARGAS = await api.get("/api/cargas");
  pintar();
}
function pintar(){
  const cont=document.getElementById("lista"), vacio=document.getElementById("vacio");
  if(!CARGAS.length){ cont.innerHTML=""; vacio.style.display="block"; return; }
  vacio.style.display="none";
  cont.innerHTML=CARGAS.map(c=>`
    <div class="tarjeta" onclick="location.href='carga.html?id=${c.id}'">
      <div class="cli">⛽ ${escaparHTML(c.unidad||"—")}
        <span class="chip">${c.tipo_pago==="tarjeta"?"💳 Tarjeta":c.tipo_pago==="efectivo"?"💵 Efectivo":"—"}</span>
      </div>
      <div class="meta">📅 ${fechaBonita(c.fecha)} ${c.hora?("· "+c.hora):""}</div>
      <div class="meta">📍 ${escaparHTML(c.lugar||"(sin lugar)")}</div>
      <div class="chips">
        <span class="chip">👷 ${escaparHTML(c.operador||"—")}${c.firmado?" ✓":""}</span>
        ${c.kilometraje?`<span class="chip">🛣️ ${Number(parseFloat(c.kilometraje)).toLocaleString()} km</span>`:""}
        ${c.nivel_combustible?`<span class="chip">⛽ ${c.nivel_combustible==="lleno"?"Lleno":c.nivel_combustible==="reserva"?"Reserva":c.nivel_combustible}</span>`:""}
        <span class="chip">📷 ${c.num_fotos} foto${c.num_fotos===1?"":"s"}</span>
      </div>
    </div>`).join("");
}
inicio();
</script>
</body>
</html>
