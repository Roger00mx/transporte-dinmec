<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Entrar — Control de Transporte DINMEC</title>
<meta name="theme-color" content="#1c3a63">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icono-192.png">
<link rel="apple-touch-icon" href="/icono-192.png">
<link rel="stylesheet" href="estilos.css">
<style>
  body{background:linear-gradient(160deg,#1c3a63,#0d1f38);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
  .login{background:#fff;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.3);padding:30px 26px;width:400px;max-width:100%;border-top:5px solid #e07312}
  .login .marca{text-align:center;margin-bottom:6px}
  .login .marca .ic{width:220px;max-width:90%}
  .login h1{text-align:center;color:#1c3a63;font-size:1.3rem;margin:8px 0 2px}
  .login .sub{text-align:center;color:#5b6470;font-size:.88rem;margin-bottom:18px}
  .login .campo{margin-bottom:13px}
  .login .btn.primario{width:100%;justify-content:center;padding:12px;font-size:1rem}
  .err{background:#fdeaea;color:#d23f3f;border-radius:8px;padding:9px 12px;font-size:.88rem;margin-bottom:12px;display:none}
  .aviso-setup{background:#e6f5ec;color:#0f7a44;border-radius:8px;padding:10px 12px;font-size:.85rem;margin-bottom:14px}
</style>
</head>
<body>
<div class="login">
  <div class="marca"><img src="/logo.png" class="ic" alt="DINMEC"></div>
  <h1 id="titulo">Control de Transporte</h1>
  <div class="sub" id="sub">DINMEC · Bitácora digital de unidades</div>
  <div class="err" id="err"></div>
  <div id="form"></div>
</div>

<script src="comun.js"></script>
<script>
async function inicio(){
  const est = await api.get("/api/estado");
  if(est.yo){ location.href="index.html"; return; }
  if(!est.configurado){ pintarSetup(); } else { pintarLogin(); }
}

function pintarLogin(){
  document.getElementById("form").innerHTML = `
    <div class="campo"><label>Usuario</label><input id="l-usuario" autocomplete="username" placeholder="tu usuario"></div>
    <div class="campo"><label>Contraseña</label><input id="l-clave" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn primario" id="l-ok">Entrar</button>`;
  const ok=document.getElementById("l-ok");
  ok.onclick=entrar;
  document.getElementById("l-clave").addEventListener("keydown",e=>{if(e.key==="Enter")entrar();});
}
async function entrar(){
  ocultarErr();
  const r=await api.post("/api/login",{usuario:val("l-usuario"),clave:val("l-clave")});
  if(r.ok){ location.href="index.html"; } else { mostrarErr(r.error||"No se pudo entrar"); }
}

function pintarSetup(){
  document.getElementById("titulo").textContent="Configuración inicial";
  document.getElementById("sub").textContent="Crea la cuenta de administrador (la primera vez)";
  document.getElementById("form").innerHTML = `
    <div class="aviso-setup">Esta cuenta podrá crear a los demás usuarios (supervisores y operadores). Guárdala bien.</div>
    <div class="campo"><label>Tu nombre completo</label><input id="s-nombre" placeholder="Ej. Ana López"></div>
    <div class="campo"><label>Usuario (para entrar)</label><input id="s-usuario" placeholder="Ej. ana"></div>
    <div class="campo"><label>Rol / puesto</label><input id="s-rol" placeholder="Ej. Coordinador de transporte"></div>
    <div class="campo"><label>Contraseña</label><input id="s-clave" type="password" placeholder="mínimo 4 caracteres"></div>
    <button class="btn primario" id="s-ok">Crear administrador y entrar</button>`;
  document.getElementById("s-ok").onclick=async()=>{
    ocultarErr();
    if(val("s-clave").length<4){ mostrarErr("La contraseña debe tener al menos 4 caracteres"); return; }
    if(!val("s-usuario")){ mostrarErr("Escribe un usuario"); return; }
    const r=await api.post("/api/setup",{nombre:val("s-nombre"),usuario:val("s-usuario"),rol:val("s-rol"),clave:val("s-clave")});
    if(r.ok){ location.href="index.html"; } else { mostrarErr(r.error||"No se pudo configurar"); }
  };
}

function val(id){return document.getElementById(id).value.trim();}
function mostrarErr(t){const e=document.getElementById("err");e.textContent=t;e.style.display="block";}
function ocultarErr(){document.getElementById("err").style.display="none";}
inicio();
</script>
</body>
</html>
